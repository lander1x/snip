syntax = "proto3";

package snip.shortener.v1;

option go_package = "github.com/landerix/snip/proto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service Shortener {
  rpc CreateLink(CreateLinkRequest) returns (Link);
  rpc ResolveLink(ResolveLinkRequest) returns (Link);
  rpc DeleteLink(DeleteLinkRequest) returns (google.protobuf.Empty);
}

message CreateLinkRequest {
  string url = 1;
  string custom_alias = 2;
}

message ResolveLinkRequest {
  string code = 1;
}

message DeleteLinkRequest {
  string code = 1;
}

message Link {
  string id = 1;
  string code = 2;
  string url = 3;
  string short_url = 4;
  int64 clicks = 5;
  google.protobuf.Timestamp created_at = 6;
}
