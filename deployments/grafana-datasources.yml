apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: snip
      port: 9000
      server: clickhouse
      username: default
      tlsSkipVerify: true
    isDefault: true
    editable: true
